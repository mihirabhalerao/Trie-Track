spring.application.name=trietrack-backend

# PostgreSQL Database Connection Settings
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dsa_tracker}
spring.datasource.username=${DB_USERNAME:dsa_admin}
spring.datasource.password=${DB_PASSWORD:dsa_secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Force Spring Boot to run data.sql scripts after Hibernate completes table updates
spring.sql.init.mode=always

# JPA/Hibernate Object Relational Mapping Behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Lettuce Client Coordinates
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:dsa_redis_password}

# Web Server Output Formatting
server.port=8080
server.error.include-message=always

# Custom JWT Encryption Parameters
# (Remove the hardcoded key so it MUST be supplied by the host system)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000